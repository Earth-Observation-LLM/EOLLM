# EOLLM Configuration File
# ======================
# This file configures the EOLLM research pipeline including:
# - LLM provider settings (Groq, Ollama)
# - Logging configuration for labeling and VQA
# - Path configuration
# - Research-specific settings

# LLM Provider Configuration
# ---------------------------
llm:
  # Default provider to use (groq | ollama)
  default_provider: "ollama"
  
  providers:
    # Groq Cloud API Configuration
    groq:
      enabled: true
      model: "meta-llama/llama-4-maverick-17b-128e-instruct"
      # API key loaded from environment variable
      # Set GROQ_API_KEY in your .env file or environment
      api_key_env: "GROQ_API_KEY"
    
    # Ollama Local API Configuration
    ollama:
      enabled: true
      # Vision-capable model (requires Ollama running locally)
      model: "gemma3:27b"
      base_url: "http://localhost:11434"

# Logging Configuration
# ---------------------
logging:
  # Labeling Pipeline Logging
  labeling:
    output_dir: "logs/labeling"
    levels:
      console: "INFO"    # Console log level (DEBUG|INFO|WARNING|ERROR|CRITICAL)
      file: "DEBUG"      # File log level (more verbose for debugging)
    llm_call_logging:
      enabled: true
      include_images: false  # Don't log base64 images (memory intensive)
      stats: ["latency", "tokens", "model", "timestamp"]
  
  # VQA Pipeline Logging
  vqa:
    output_dir: "logs/vqa"
    levels:
      console: "INFO"
      file: "DEBUG"
    llm_call_logging:
      enabled: true
      include_images: false
      stats: ["latency", "tokens", "model", "timestamp"]

# Paths Configuration
# -------------------
paths:
  # Input structure JSON for labeling pairs
  input_structure: "input_structure.json"
  
  # Jinja2 template directory
  templates: "src/prompts/templates"
  
  # Data root directory
  data_root: "data"

# Research Settings
# -----------------
research:
  # Labeling Pipeline Settings
  labeling:
    # Maximum retries for failed LLM calls
    max_retries: 3
    
    # Maintain conversation context across satellite and street view
    conversation_mode: true
  
  # VQA Pipeline Settings
  vqa:
    # Minimum number of questions to generate
    min_questions: 15
    
    # Maximum number of questions to generate
    max_questions: 20
    
    # Question categories to cover
    categories:
      - "sustainability"
      - "infrastructure"
      - "economic"
      - "maintenance"
      - "development"
    
    # Use fresh conversation (not continuing from labeling)
    fresh_conversation: true

